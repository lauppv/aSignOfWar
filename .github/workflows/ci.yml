name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  server:
    name: server (typecheck + 90% coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - run: npm run test:coverage
      - name: Build coverage comment
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        working-directory: ${{ github.workspace }}
        run: node .github/scripts/coverage-comment.mjs "server" server/coverage/coverage-summary.json > coverage-comment.txt
      - name: Comment coverage on PR
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-server
          recreate: true
          path: coverage-comment.txt
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  client:
    name: client (typecheck + 90% coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npx tsc -b
      - run: npm run test:coverage
      - name: Build coverage comment
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        working-directory: ${{ github.workspace }}
        run: node .github/scripts/coverage-comment.mjs "client" client/coverage/coverage-summary.json > coverage-comment.txt
      - name: Comment coverage on PR
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-client
          recreate: true
          path: coverage-comment.txt
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
