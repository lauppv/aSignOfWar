name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  server:
    name: server (typecheck + 90% coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - run: npm run test:coverage
      - name: Report coverage
        if: ${{ !cancelled() }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: server
          working-directory: server

  client:
    name: client (typecheck + 90% coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npx tsc -b
      - run: npm run test:coverage
      - name: Report coverage
        if: ${{ !cancelled() }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: client
          working-directory: client
